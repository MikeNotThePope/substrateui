name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      # npm OIDC trusted publishing requires npm >= 11.5.1; node 20 ships npm 10.
      - run: npm install -g npm@latest

      - run: bun install --frozen-lockfile

      - run: bun run audit:contrast
      - run: bun run build:lib

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: bun run release
          version: bun run version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No npm token: publish authenticates via OIDC trusted publishing
          # (configured on the npm package). Requires `id-token: write` above
          # and npm >= 11.5.1 (installed above). Provenance is part of OIDC.
          NPM_CONFIG_PROVENANCE: "true"
